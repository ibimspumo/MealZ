name: Release macOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Release Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: MealZ v__VERSION__
          releaseBody: |
            MealZ v__VERSION__ für Macs mit Apple Silicon.

            - Turngenaue, sichtbare Agenten-Aktivitäten mit Webrecherche und Bildstatus
            - Reparierter Start eines neuen Gesprächs und aktives Memory-Verhalten
            - Rezeptlöschung, Kalender-Aktualisierung und begrenzte Rezeptbilder
            - Klickbare Kalenderkarten mit Detailmodal und informativer Agenda
            - Fixierte Agentenansicht mit intern scrollendem Nachrichtenverlauf
            - Isolierte Development-Datenbank zum Schutz persönlicher Live-Daten
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
