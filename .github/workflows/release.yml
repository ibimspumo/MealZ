name: Release macOS

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Release Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: pnpm install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: MealZ v__VERSION__
          releaseBody: |
            MealZ v__VERSION__ für Macs mit Apple Silicon.

            - Zuverlässiger In-App-Dialog zum Starten neuer Gespräche
            - Lokale Gesprächshistorie mit Vorschau, Zeitstempel und Wiederöffnen
            - Gespeicherte Codex-Threads werden beim Gesprächswechsel fortgesetzt
            - Echtes Kontext-Monitoring mit automatischer Codex-Verdichtung und sicherer Neuer-Chat-Empfehlung
            - Sichtbare Lade- und Fehlerzustände statt unsichtbarer Browserdialoge
            - Reparierte Rezept- und Memory-Löschung mit Bestätigungsdialog
            - Rollback auf das vorherige Gespräch bei einem App-Server-Fehler
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
